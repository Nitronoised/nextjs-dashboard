<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="760" viewBox="0 0 1000 760" role="img" aria-labelledby="title desc">
  <title id="title">Dashboard hero desktop placeholder</title>
  <desc id="desc">A decorative placeholder for the desktop dashboard hero image.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="760" fill="url(#bg)"/>
  <rect x="90" y="80" width="820" height="600" rx="24" fill="#ffffff" opacity="0.9"/>
  <rect x="130" y="130" width="300" height="28" rx="8" fill="#1d4ed8" opacity="0.85"/>
  <rect x="130" y="190" width="740" height="14" rx="7" fill="#93c5fd"/>
  <rect x="130" y="220" width="640" height="14" rx="7" fill="#bfdbfe"/>
  <rect x="130" y="280" width="230" height="160" rx="14" fill="#eff6ff"/>
  <rect x="385" y="280" width="230" height="160" rx="14" fill="#dbeafe"/>
  <rect x="640" y="280" width="230" height="160" rx="14" fill="#bfdbfe"/>
  <rect x="130" y="470" width="740" height="160" rx="14" fill="#eff6ff"/>
</svg>
