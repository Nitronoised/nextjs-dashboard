<svg xmlns="http://www.w3.org/2000/svg" width="560" height="620" viewBox="0 0 560 620" role="img" aria-labelledby="title desc">
  <title id="title">Dashboard hero mobile placeholder</title>
  <desc id="desc">A decorative placeholder for the mobile dashboard hero image.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
  </defs>
  <rect width="560" height="620" fill="url(#bg)"/>
  <rect x="48" y="48" width="464" height="524" rx="24" fill="#ffffff" opacity="0.92"/>
  <rect x="82" y="92" width="210" height="24" rx="8" fill="#1d4ed8" opacity="0.85"/>
  <rect x="82" y="140" width="396" height="12" rx="6" fill="#93c5fd"/>
  <rect x="82" y="164" width="328" height="12" rx="6" fill="#bfdbfe"/>
  <rect x="82" y="210" width="396" height="130" rx="14" fill="#eff6ff"/>
  <rect x="82" y="358" width="186" height="120" rx="14" fill="#dbeafe"/>
  <rect x="292" y="358" width="186" height="120" rx="14" fill="#bfdbfe"/>
</svg>
